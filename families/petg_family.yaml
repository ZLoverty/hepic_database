# 1. 定义一个 PLA 的标准模板 (Base Template)
_petg_base: &petg_default
  name: "PETG"
  excellent_force_range: [13.0, 27.0]
  force_range: [13.0, 27.0]
  temperature: 240
  speed: 5
  stability_threshold: 0.5

# 2. 具体的材料条目直接继承模板，只需写“差异化”的参数
G235:
  <<: *petg_default
  PI_Code: "G235"
  excellent_force_range: [13.0, 23.0]
  force_range: [13.0, 23.0]