# 1. 定义一个 PLA 的标准模板 (Base Template)
_pla_base: &pla_default
  name: "PLA"
  excellent_force_range: [9.0, 11.0]
  force_range: [8.0, 12.0]
  temperature: 220
  speed: 6.7
  stability_threshold: 0.5

# 2. 具体的材料条目直接继承模板，只需写“差异化”的参数
L1002:
  <<: *pla_default
  PI_Code: "L1002"
  excellent_force_range: [11.0, 16.0]
  force_range: [11, 16]

L3002:
  <<: *pla_default
  PI_Code: "L3002"
  excellent_force_range: [11.0, 19.0]
  force_range: [11.0, 19.0]
  speed: 5
