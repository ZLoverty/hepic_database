# 1. 定义一个 ASA 的标准模板 (Base Template)
_asa_base: &asa_default
  name: "ASA"
  excellent_force_range: [14.0, 22.0]
  force_range: [12.0, 24.0]
  temperature: 255
  speed: 4.5
  stability_threshold: 0.5

# 2. 具体的材料条目直接继承模板，只需写“差异化”的参数
AS300CF08:
  <<: *asa_default
  PI_Code: "AS300CF08"
  excellent_force_range: [9, 25]
  force_range: [9, 25]
  temperature: 270
  speed: 6.7
  
AS200:
  <<: *asa_default
  PI_Code: "AS200"
  excellent_force_range: [10.0, 16.0]
  force_range: [10.0, 16.0]
  temperature: 250
  speed: 4.6 