name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v2026.08.01)"
        required: true

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag & manifest version
        id: version
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          MANIFEST_VERSION="$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")"

          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($VERSION) != manifest.json version ($MANIFEST_VERSION). Bump manifest.json before tagging."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package materials.zip
        run: |
          set -euo pipefail
          mkdir -p dist
          zip -r "dist/materials.zip" manifest.json families/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "hepic_database ${{ steps.version.outputs.version }}"
          files: dist/materials.zip
          draft: false
